<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Periodic Table Demo</title>

    <style>
      body {
        font-family: system-ui;
        margin: 0;
        padding: 20px;
        background: white;
        color: black;
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr 320px;
        gap: 20px;
        align-items: start;
      }

      periodic-table {
        padding: 10px;
        border-radius: 10px;
        display: block;
      }

      .panel {
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 10px;
      }

      .control {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .control label {
        font-size: 12px;
        opacity: 0.7;
        display: flex;
        justify-content: space-between;
      }

      input[type="range"] {
        width: 100%;
      }

      pre {
        background: #f6f6f6;
        padding: 10px;
        border-radius: 10px;
        overflow: auto;
        font-size: 12px;
      }
    </style>
  </head>

  <body>
    <div class="layout">
      <periodic-table id="pt" f-block-offset-px="14"></periodic-table>

      <div class="panel">
        <h3>Controls</h3>

        <div class="control">
          <label>
            Font size
            <span id="fontVal">12px</span>
          </label>
          <input
            id="font"
            type="range"
            min="8"
            max="22"
            value="14"
            step="0.25"
          />
        </div>

        <div class="control">
          <label>
            Cell size
            <span id="sizeVal">44px</span>
          </label>
          <input id="size" type="range" min="28" max="60" value="42" />
        </div>

        <div class="control">
          <label>
            Grid gap
            <span id="gapVal">3px</span>
          </label>
          <input id="gap" type="range" min="0" max="12" value="3" />
        </div>

        <div class="control">
          <label>
            Top scale
            <span id="topScaleVal">0.9</span>
          </label>
          <input
            id="topScale"
            type="range"
            min="0.4"
            max="1.5"
            step="0.05"
            value="0.9"
          />
        </div>

        <div class="control">
          <label>
            Center scale
            <span id="centerScaleVal">1.4</span>
          </label>
          <input
            id="centerScale"
            type="range"
            min="0.5"
            max="3"
            step="0.05"
            value="1.4"
          />
        </div>

        <div class="control">
          <label>
            Bottom scale
            <span id="bottomScaleVal">0.0</span>
          </label>
          <input
            id="bottomScale"
            type="range"
            min="0.0"
            max="1.5"
            step="0.05"
            value="0.00"
          />
        </div>

        <div class="control">
          <label>
            f-block offset
            <span id="fOffsetVal">14px</span>
          </label>

          <input id="fOffset" type="range" min="0" max="40" value="14" />
        </div>

        <h3>State</h3>
        <pre id="out">click elements…</pre>
      </div>
    </div>

    <script type="module">
      import "../src/periodic-table";
      import symbols from "../src/data/symbols.ts";
      import masses from "../src/data/masses.ts";
      import names from "../src/data/names.ts";

      const pt = document.getElementById("pt");

      pt.stateCount = 4;

      pt.setCellInteraction([1, 2, 3], "noHighlight");
      pt.setCellInteraction([100, 101, 102, 103], "noInteractive");

      const out = document.getElementById("out");

      pt.fields = {
        // topLeft: (a) => a,
        // topRight: (a) => masses[a]?.toFixed(1) || "N/A",
        topCenter: (a) => a,
        center: (a) => symbols[a],
        bottom: (a) => names[a],
      };

      pt.addEventListener("change", (e) => {
        out.textContent = JSON.stringify(e.detail, null, 2);
      });

      const bind = (id, unit, prop, labelId) => {
        const el = document.getElementById(id);
        const label = document.getElementById(labelId);

        const update = (v) => {
          pt.style.setProperty(`--${prop}`, `${v}${unit}`);
          if (label) label.textContent = `${v}${unit}`;
        };

        update(el.value);

        el.addEventListener("input", (e) => {
          update(e.target.value);
        });
      };

      bind("font", "px", "font-size", "fontVal");
      bind("size", "px", "cell-size", "sizeVal");
      bind("gap", "px", "gap", "gapVal");

      bind("topScale", "", "font-scale-top", "topScaleVal");
      bind("centerScale", "", "font-scale-center", "centerScaleVal");
      bind("bottomScale", "", "font-scale-bottom", "bottomScaleVal");

      bind("fOffset", "px", "f-offset", "fOffsetVal");
    </script>
  </body>
</html>
